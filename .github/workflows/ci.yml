name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  # Test exactly the toolchain the matrix installs; fail loudly instead of
  # silently downloading a different one when go.mod moves ahead.
  GOTOOLCHAIN: local

jobs:
  test:
    name: test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Floor policy: the library tracks the latest stable Go release.
        # Until Go 1.27 is stable the floor is the release candidate; once
        # it ships this becomes the stable 1.27.x line.
        go: ['1.27.0-rc.1']
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: ${{ matrix.go }}
          # Zero-dependency module: go.sum never exists, so key caches
          # off go.mod instead.
          cache-dependency-path: go.mod
      - name: gofmt
        run: |
          drift=$(gofmt -l .)
          if [ -n "$drift" ]; then
            echo "gofmt drift in:" && echo "$drift" && exit 1
          fi
      - name: go vet (includes stdversion)
        run: go vet ./...
      - name: build
        run: go build ./...
      - name: test (race)
        run: go test -race ./...

  # Goroutine-leak verification needs no dedicated job: the goroutineleak
  # pprof profile graduated from GOEXPERIMENT (Go 1.26) to a predefined
  # profile in Go 1.27, so the lifecycle test suite asserts on it directly
  # inside the normal race-enabled test job.
  modernize:
    name: go fix (modernizers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: '1.27.0-rc.1'
          cache-dependency-path: go.mod
      - name: apply modernizers
        run: go fix ./...
      - name: fail on drift
        run: git diff --exit-code
